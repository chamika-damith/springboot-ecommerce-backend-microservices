services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 2002
      MYSQL_DATABASE: ecommercemicroservice
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  eureka-server:
    build:
      context: .
      dockerfile: Eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      EUREKA_HOST: eureka-server
    ports:
      - "8761:8761"

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecommercemicroservice
      DB_USERNAME: root
      DB_PASSWORD: 2002
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "8081:8081"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecommercemicroservice
      DB_USERNAME: root
      DB_PASSWORD: 2002
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    ports:
      - "8082:8082"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecommercemicroservice
      DB_USERNAME: root
      DB_PASSWORD: 2002
      PRODUCT_SERVICE_BASE_URL: http://product-service:8081
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      product-service:
        condition: service_started
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      PRODUCT_SERVICE_URL: http://product-service:8081
      USER_SERVICE_URL: http://user-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
    depends_on:
      eureka-server:
        condition: service_started
      product-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  mysql-data:
